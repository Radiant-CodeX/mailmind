# Development / demo stack (mock mode).
# For production, layer the override:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# OBS-03: Jaeger tracing  ·  OBS-04: Prometheus metrics

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - USE_MOCK_GRAPH=true
      - APPROVAL_TOKEN=secret-approval-token
      - FRONTEND_ORIGIN=http://localhost:3000
      - OTEL_EXPORTER_JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - PROMETHEUS_PORT=9090
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - jaeger
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686" # Jaeger UI  →  http://localhost:16686
      - "14268:14268" # HTTP collector (traces from backend)
      - "6831:6831/udp" # UDP agent
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
