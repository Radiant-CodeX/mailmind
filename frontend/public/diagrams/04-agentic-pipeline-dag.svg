<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .title{font-size:30px;font-weight:700;fill:#0f172a}
    .sub{font-size:15px;fill:#64748b}
    .node{font-size:17px;font-weight:700}
    .li{font-size:12.5px;fill:#334155}
    .stage{font-size:11px;font-weight:700;letter-spacing:1px;fill:#94a3b8}
    .edge{stroke:#475569;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    .tech{font-size:11.5px;fill:#7c3aed;font-weight:600}
  </style>

  <text x="600" y="46" text-anchor="middle" class="title">Agentic Pipeline — LangGraph DAG</text>
  <text x="600" y="72" text-anchor="middle" class="sub">Six autonomous nodes · perceive → reason → plan → propose → defer → learn</text>

  <!-- START -->
  <rect x="510" y="100" width="180" height="44" rx="22" fill="#0f172a"/>
  <text x="600" y="128" text-anchor="middle" class="node" fill="#ffffff">START</text>
  <line x1="600" y1="144" x2="600" y2="176" class="edge"/>

  <!-- ingest -->
  <text x="120" y="206" class="stage">PERCEIVE</text>
  <rect x="380" y="178" width="440" height="78" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="600" y="208" text-anchor="middle" class="node" fill="#1e3a8a">1 · ingest_node</text>
  <text x="600" y="232" text-anchor="middle" class="li">PII masking · payload validation · queue management</text>
  <text x="845" y="222" class="tech">spaCy · regex mask</text>
  <line x1="600" y1="256" x2="600" y2="288" class="edge"/>

  <!-- triage -->
  <text x="120" y="318" class="stage">REASON</text>
  <rect x="380" y="290" width="440" height="78" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="320" text-anchor="middle" class="node" fill="#166534">2 · triage_node</text>
  <text x="600" y="344" text-anchor="middle" class="li">5-axis scoring → composite priority (explainable)</text>
  <text x="845" y="334" class="tech">GPT-4o-mini + scorers</text>
  <line x1="600" y1="368" x2="600" y2="400" class="edge"/>

  <!-- commitment -->
  <text x="120" y="430" class="stage">PLAN</text>
  <rect x="380" y="402" width="440" height="78" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="432" text-anchor="middle" class="node" fill="#166534">3 · commitment_node</text>
  <text x="600" y="456" text-anchor="middle" class="li">extract promises + deadlines (structured output)</text>
  <text x="845" y="446" class="tech">GPT-4o-mini JSON</text>
  <line x1="600" y1="480" x2="600" y2="512" class="edge"/>

  <!-- calendar -->
  <rect x="380" y="514" width="440" height="78" rx="12" fill="#ccfbf1" stroke="#14b8a6" stroke-width="2"/>
  <text x="600" y="544" text-anchor="middle" class="node" fill="#115e59">4 · calendar_node</text>
  <text x="600" y="568" text-anchor="middle" class="li">deterministic calendar conflict detection</text>
  <text x="845" y="558" class="tech">Graph / Gmail Cal</text>
  <line x1="600" y1="592" x2="600" y2="624" class="edge"/>

  <!-- rag -->
  <text x="120" y="654" class="stage">PROPOSE</text>
  <rect x="380" y="626" width="440" height="78" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="656" text-anchor="middle" class="node" fill="#166534">5 · rag_node</text>
  <text x="600" y="680" text-anchor="middle" class="li">retrieve precedents → Tone-DNA draft generation</text>
  <text x="845" y="670" class="tech">ChromaDB + GPT-4o-mini</text>
  <line x1="600" y1="704" x2="600" y2="736" class="edge"/>

  <!-- gate -->
  <text x="120" y="766" class="stage">DEFER</text>
  <rect x="380" y="738" width="440" height="78" rx="12" fill="#fef9c3" stroke="#eab308" stroke-width="2.5"/>
  <text x="600" y="768" text-anchor="middle" class="node" fill="#854d0e">6 · gate_node</text>
  <text x="600" y="792" text-anchor="middle" class="li">HUMAN-IN-THE-LOOP approval checkpoint</text>
  <text x="845" y="782" class="tech">never auto-sends</text>
  <line x1="600" y1="816" x2="600" y2="846" class="edge"/>

  <!-- END -->
  <rect x="510" y="848" width="180" height="44" rx="22" fill="#0f172a"/>
  <text x="600" y="876" text-anchor="middle" class="node" fill="#ffffff">END</text>

  <!-- learn loop -->
  <path d="M820 765 C 1010 765, 1010 215, 820 215" class="edge"/>
  <text x="1015" y="486" text-anchor="middle" class="stage" transform="rotate(90 1015 486)">LEARN — Tone DNA + RAG corpus grow with every interaction</text>

  <!-- legend -->
  <rect x="40" y="130" width="300" height="120" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="56" y="152" class="stage" fill="#475569">LEGEND</text>
  <rect x="56" y="162" width="20" height="14" rx="3" fill="#dbeafe" stroke="#3b82f6"/><text x="84" y="174" class="li">Perception / I/O</text>
  <rect x="56" y="184" width="20" height="14" rx="3" fill="#dcfce7" stroke="#22c55e"/><text x="84" y="196" class="li">LLM reasoning (GPT-4o-mini)</text>
  <rect x="56" y="206" width="20" height="14" rx="3" fill="#ccfbf1" stroke="#14b8a6"/><text x="84" y="218" class="li">Deterministic logic</text>
  <rect x="56" y="228" width="20" height="14" rx="3" fill="#fef9c3" stroke="#eab308"/><text x="84" y="240" class="li">Human supervision</text>
</svg>
