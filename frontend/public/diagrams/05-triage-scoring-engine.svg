<svg viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .title{font-size:30px;font-weight:700;fill:#0f172a}
    .sub{font-size:15px;fill:#64748b}
    .axis{font-size:15px;font-weight:700}
    .li{font-size:12px;fill:#334155}
    .edge{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .w{font-size:11px;fill:#7c3aed;font-weight:700}
  </style>

  <text x="600" y="46" text-anchor="middle" class="title">5-Axis Triage Scoring Engine</text>
  <text x="600" y="72" text-anchor="middle" class="sub">Explainable priority — each axis scores independently and returns a human-readable reason</text>

  <!-- input -->
  <rect x="470" y="100" width="260" height="60" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="600" y="126" text-anchor="middle" class="axis" fill="#1e3a8a">Email (PII-masked)</text>
  <text x="600" y="146" text-anchor="middle" class="li">checked against per-user triage cache first</text>

  <!-- fan out lines -->
  <line x1="600" y1="160" x2="160" y2="210" class="edge"/>
  <line x1="600" y1="160" x2="380" y2="210" class="edge"/>
  <line x1="600" y1="160" x2="600" y2="210" class="edge"/>
  <line x1="600" y1="160" x2="820" y2="210" class="edge"/>
  <line x1="600" y1="160" x2="1040" y2="210" class="edge"/>

  <!-- axis 1 -->
  <rect x="40" y="212" width="240" height="150" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="160" y="238" text-anchor="middle" class="axis" fill="#991b1b">Deadline</text>
  <text x="270" y="234" text-anchor="end" class="w">w .30</text>
  <text x="56" y="262" class="li">regex: "by 3pm", "EOD", "ASAP"</text>
  <text x="56" y="284" class="li">&lt; 4h → 1.0 (critical)</text>
  <text x="56" y="306" class="li">&lt; 1 day → 0.7</text>
  <text x="56" y="340" class="li" font-style="italic" fill="#475569">"Due in 2h → urgent"</text>

  <!-- axis 2 -->
  <rect x="300" y="212" width="240" height="150" rx="12" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="420" y="238" text-anchor="middle" class="axis" fill="#9a3412">Sender Authority</text>
  <text x="530" y="234" text-anchor="end" class="w">w .25</text>
  <text x="316" y="262" class="li">frequent-contact graph</text>
  <text x="316" y="284" class="li">CEO / manager → 0.9</text>
  <text x="316" y="306" class="li">unknown sender → 0.2</text>
  <text x="316" y="340" class="li" font-style="italic" fill="#475569">"From your manager"</text>

  <!-- axis 3 -->
  <rect x="560" y="212" width="240" height="150" rx="12" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="680" y="238" text-anchor="middle" class="axis" fill="#854d0e">Sentiment</text>
  <text x="790" y="234" text-anchor="end" class="w">w .15</text>
  <text x="576" y="262" class="li">spaCy NLP (en_core_web_sm)</text>
  <text x="576" y="284" class="li">"urgent/critical" → 0.9</text>
  <text x="576" y="306" class="li">positive tone → 0.3</text>
  <text x="576" y="340" class="li" font-style="italic" fill="#475569">"Tone reads as urgent"</text>

  <!-- axis 4 -->
  <rect x="820" y="212" width="240" height="150" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="940" y="238" text-anchor="middle" class="axis" fill="#166534">Thread-Age Decay</text>
  <text x="1050" y="234" text-anchor="end" class="w">w .15</text>
  <text x="836" y="262" class="li">&lt; 1h old → 1.0</text>
  <text x="836" y="284" class="li">&gt; 24h old → 0.3</text>
  <text x="836" y="306" class="li">recency-weighted</text>
  <text x="836" y="340" class="li" font-style="italic" fill="#475569">"Just arrived"</text>

  <!-- axis 5 -->
  <rect x="1080" y="212" width="0" height="0"/>
  <rect x="980" y="392" width="0" height="0"/>

  <!-- axis 5 placed centered below -->
  <rect x="480" y="392" width="240" height="120" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="600" y="418" text-anchor="middle" class="axis" fill="#5b21b6">Action Type</text>
  <text x="710" y="414" text-anchor="end" class="w">w .15</text>
  <text x="496" y="442" class="li">"FYI" → 0.2</text>
  <text x="496" y="464" class="li">"Review" → 0.6</text>
  <text x="496" y="486" class="li">"Approval needed" → 0.9</text>

  <!-- arrows to aggregator -->
  <line x1="160" y1="362" x2="540" y2="560" class="edge"/>
  <line x1="420" y1="362" x2="560" y2="560" class="edge"/>
  <line x1="680" y1="362" x2="640" y2="560" class="edge"/>
  <line x1="940" y1="362" x2="660" y2="560" class="edge"/>
  <line x1="600" y1="512" x2="600" y2="558" class="edge"/>

  <!-- aggregator -->
  <rect x="430" y="560" width="340" height="80" rx="12" fill="#0f172a"/>
  <text x="600" y="590" text-anchor="middle" class="axis" fill="#ffffff">CompositeAggregator</text>
  <text x="600" y="614" text-anchor="middle" class="li" fill="#cbd5e1">weighted average of 5 axes → score 0–100</text>

  <line x1="600" y1="640" x2="600" y2="680" class="edge"/>

  <!-- output bands -->
  <rect x="300" y="682" width="180" height="70" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="390" y="710" text-anchor="middle" class="axis" fill="#991b1b">CRITICAL</text>
  <text x="390" y="732" text-anchor="middle" class="li">≥ 0.75</text>

  <rect x="510" y="682" width="180" height="70" rx="12" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="600" y="710" text-anchor="middle" class="axis" fill="#9a3412">HIGH</text>
  <text x="600" y="732" text-anchor="middle" class="li">0.50 – 0.75</text>

  <rect x="720" y="682" width="180" height="70" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="810" y="710" text-anchor="middle" class="axis" fill="#475569">NORMAL</text>
  <text x="810" y="732" text-anchor="middle" class="li">&lt; 0.50</text>

  <text x="600" y="790" text-anchor="middle" class="li" font-style="italic">Result cached per user+email (TTL 1h) → instant on re-open · shared scorers reused across batch for speed</text>
</svg>
