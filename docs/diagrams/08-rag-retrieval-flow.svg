<svg viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .title{font-size:30px;font-weight:700;fill:#0f172a}
    .sub{font-size:15px;fill:#64748b}
    .lbl{font-size:14px;font-weight:600}
    .li{font-size:12px;fill:#334155}
    .edge{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .elbl{font-size:11.5px;fill:#475569;font-style:italic}
  </style>

  <text x="550" y="46" text-anchor="middle" class="title">RAG Precedent Retrieval (ChromaDB)</text>
  <text x="550" y="72" text-anchor="middle" class="sub">Grounding drafts in the user's real history — per-account isolated vector store</text>

  <!-- input -->
  <rect x="380" y="100" width="340" height="58" rx="11" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="550" y="125" text-anchor="middle" class="lbl" fill="#1e3a8a">Masked email text</text>
  <text x="550" y="145" text-anchor="middle" class="li">POST /api/rag/retrieve</text>
  <line x1="550" y1="158" x2="550" y2="192" class="edge"/>

  <!-- cache check -->
  <polygon points="550,192 700,238 550,284 400,238" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="550" y="236" text-anchor="middle" class="lbl" fill="#854d0e">cache hit?</text>
  <text x="550" y="254" text-anchor="middle" class="li">retrieve:{user}:sha256</text>

  <line x1="700" y1="238" x2="850" y2="238" class="edge"/>
  <text x="730" y="228" class="li" font-weight="700" fill="#16a34a">hit</text>
  <rect x="850" y="208" width="220" height="60" rx="11" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="960" y="234" text-anchor="middle" class="lbl" fill="#166534">return precedents</text>
  <text x="960" y="254" text-anchor="middle" class="li">instant</text>

  <line x1="550" y1="284" x2="550" y2="320" class="edge"/>
  <text x="560" y="306" class="li" font-weight="700" fill="#ef4444">miss</text>

  <!-- embed -->
  <rect x="380" y="322" width="340" height="58" rx="11" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="550" y="347" text-anchor="middle" class="lbl" fill="#166534">1 · Embed query</text>
  <text x="550" y="367" text-anchor="middle" class="li">OpenAI → 1536-dim vector</text>
  <line x1="550" y1="380" x2="550" y2="414" class="edge"/>

  <!-- chroma -->
  <rect x="340" y="416" width="420" height="120" rx="11" fill="#ccfbf1" stroke="#14b8a6" stroke-width="2"/>
  <text x="550" y="442" text-anchor="middle" class="lbl" fill="#115e59">2 · Query ChromaDB (./chroma_db/)</text>
  <text x="550" y="464" text-anchor="middle" class="li">cosine similarity search</text>
  <text x="550" y="484" text-anchor="middle" class="li">→ top-5 precedents above threshold</text>
  <text x="550" y="510" text-anchor="middle" class="elbl">index.json · chroma.parquet · data/documents.json</text>

  <!-- isolation note -->
  <rect x="790" y="416" width="280" height="120" rx="11" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="930" y="442" text-anchor="middle" class="lbl" fill="#991b1b">Per-account isolation</text>
  <text x="806" y="468" class="li">each user+account has its</text>
  <text x="806" y="486" class="li">own collection — no</text>
  <text x="806" y="504" class="li">cross-account retrieval</text>
  <text x="806" y="522" class="li">leakage is possible</text>
  <line x1="760" y1="476" x2="788" y2="476" class="edge"/>

  <line x1="550" y1="536" x2="550" y2="572" class="edge"/>

  <!-- output -->
  <rect x="360" y="574" width="380" height="70" rx="11" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="550" y="600" text-anchor="middle" class="lbl" fill="#1e3a8a">PrecedentItem[] + similarity scores</text>
  <text x="550" y="622" text-anchor="middle" class="li">cache write · feeds draft generation</text>

  <text x="550" y="685" text-anchor="middle" class="li" font-style="italic">Why RAG: the model recalls what you actually wrote instead of inventing — this is how we eliminate hallucinated drafts.</text>
</svg>
