<svg viewBox="0 0 1100 660" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .title{font-size:30px;font-weight:700;fill:#0f172a}
    .sub{font-size:15px;fill:#64748b}
    .lbl{font-size:14px;font-weight:600}
    .li{font-size:12px;fill:#334155}
    .edge{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .mono{font-size:11.5px;fill:#334155;font-family:Consolas,monospace}
  </style>

  <text x="550" y="46" text-anchor="middle" class="title">Commitment Extraction → Tasks / Calendar</text>
  <text x="550" y="72" text-anchor="middle" class="sub">Turning promises buried in email into tracked, actionable items</text>

  <!-- 1 -->
  <rect x="380" y="100" width="340" height="58" rx="11" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="550" y="125" text-anchor="middle" class="lbl" fill="#1e3a8a">POST /commitments/extract</text>
  <text x="550" y="145" text-anchor="middle" class="li">email_text · thread_summary · email_id</text>
  <line x1="550" y1="158" x2="550" y2="190" class="edge"/>

  <!-- 2 pii -->
  <rect x="380" y="192" width="340" height="58" rx="11" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="550" y="217" text-anchor="middle" class="lbl" fill="#991b1b">1 · PII masking (before LLM)</text>
  <text x="550" y="237" text-anchor="middle" class="li">emails · SSN · cards → [PII_*]</text>
  <line x1="550" y1="250" x2="550" y2="282" class="edge"/>

  <!-- 3 llm -->
  <rect x="360" y="284" width="380" height="78" rx="11" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="550" y="312" text-anchor="middle" class="lbl" fill="#166534">2 · GPT-4o structured output</text>
  <text x="550" y="334" text-anchor="middle" class="li">returns typed JSON — id · text · deadline ·</text>
  <text x="550" y="352" text-anchor="middle" class="li">type · confidence</text>
  <line x1="550" y1="362" x2="550" y2="396" class="edge"/>

  <!-- example -->
  <rect x="760" y="284" width="320" height="120" rx="11" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="776" y="308" class="lbl" fill="#475569">Example output</text>
  <text x="776" y="332" class="mono">{ "text": "Call client by 3pm",</text>
  <text x="776" y="350" class="mono">  "deadline": "...", "type":</text>
  <text x="776" y="368" class="mono">  "call", "confidence": 0.95 }</text>
  <text x="776" y="392" class="mono">{ "text": "Submit report", ... }</text>
  <line x1="740" y1="323" x2="758" y2="323" class="edge"/>

  <!-- 4 results -->
  <rect x="360" y="398" width="380" height="58" rx="11" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="550" y="423" text-anchor="middle" class="lbl" fill="#5b21b6">3 · Render in Commitment Gate</text>
  <text x="550" y="443" text-anchor="middle" class="li">user selects which to confirm (status: pending)</text>
  <line x1="550" y1="456" x2="550" y2="490" class="edge"/>

  <!-- split -->
  <line x1="550" y1="490" x2="330" y2="520" class="edge"/>
  <line x1="550" y1="490" x2="770" y2="520" class="edge"/>

  <rect x="160" y="522" width="340" height="70" rx="11" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="330" y="548" text-anchor="middle" class="lbl" fill="#115e59">Push to Tasks</text>
  <text x="330" y="570" text-anchor="middle" class="li">deliverables → task system (taskUrls)</text>

  <rect x="600" y="522" width="340" height="70" rx="11" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="770" y="548" text-anchor="middle" class="lbl" fill="#115e59">Push to Calendar</text>
  <text x="770" y="570" text-anchor="middle" class="li">time-bound → calendar events (eventUrls)</text>

  <text x="550" y="630" text-anchor="middle" class="li" font-style="italic">Optional DB write to commitments table — nothing is created until the human confirms.</text>
</svg>
