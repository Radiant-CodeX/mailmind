<svg viewBox="0 0 1100 760" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .title{font-size:30px;font-weight:700;fill:#0f172a}
    .sub{font-size:15px;fill:#64748b}
    .lbl{font-size:14px;font-weight:600}
    .li{font-size:12px;fill:#334155}
    .edge{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .elbl{font-size:11.5px;fill:#475569;font-style:italic}
  </style>

  <text x="550" y="46" text-anchor="middle" class="title">Dashboard Load &amp; Inbox Initialization</text>
  <text x="550" y="72" text-anchor="middle" class="sub">Mount → auth check → fetch emails → batch triage scoring</text>

  <!-- 1 mount -->
  <rect x="380" y="100" width="340" height="64" rx="11" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="550" y="126" text-anchor="middle" class="lbl" fill="#1e3a8a">1 · Dashboard mounts</text>
  <text x="550" y="148" text-anchor="middle" class="li">useEffect → checkAuthStatus() (retry 3× / 600ms)</text>
  <line x1="550" y1="164" x2="550" y2="200" class="edge"/>

  <!-- decision auth -->
  <polygon points="550,200 700,250 550,300 400,250" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="550" y="248" text-anchor="middle" class="lbl" fill="#854d0e">authenticated?</text>
  <text x="550" y="266" text-anchor="middle" class="li">cookie valid</text>

  <line x1="400" y1="250" x2="270" y2="250" class="edge"/>
  <text x="300" y="240" class="li" font-weight="700" fill="#ef4444">no</text>
  <rect x="40" y="220" width="230" height="60" rx="11" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="155" y="246" text-anchor="middle" class="lbl" fill="#991b1b">router.push(/login)</text>
  <text x="155" y="266" text-anchor="middle" class="li">stop · show login</text>

  <line x1="550" y1="300" x2="550" y2="336" class="edge"/>
  <text x="560" y="322" class="li" font-weight="700" fill="#16a34a">yes</text>

  <!-- 2 set user -->
  <rect x="360" y="338" width="380" height="84" rx="11" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="550" y="364" text-anchor="middle" class="lbl" fill="#5b21b6">2 · Establish user context</text>
  <text x="550" y="386" text-anchor="middle" class="li">setUser · setProvider · default account id</text>
  <text x="550" y="406" text-anchor="middle" class="li">userStorage.setUser() — scopes localStorage per user</text>
  <line x1="550" y1="422" x2="550" y2="458" class="edge"/>

  <!-- onboarding branch -->
  <rect x="760" y="350" width="300" height="60" rx="11" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="910" y="376" text-anchor="middle" class="lbl" fill="#166534">first login? → Onboarding</text>
  <text x="910" y="396" text-anchor="middle" class="li">key: mailmind_onboarded_{email}</text>
  <line x1="740" y1="380" x2="758" y2="380" class="edge"/>

  <!-- 3 fetch emails -->
  <rect x="360" y="460" width="380" height="84" rx="11" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="550" y="486" text-anchor="middle" class="lbl" fill="#5b21b6">3 · useEmails → POST /api/mailbox</text>
  <text x="550" y="508" text-anchor="middle" class="li">get_mail_client() → list_emails(inbox, 50)</text>
  <text x="550" y="528" text-anchor="middle" class="li">Gmail API / MS Graph → EmailPage</text>
  <line x1="550" y1="544" x2="550" y2="580" class="edge"/>

  <!-- 4 render -->
  <rect x="360" y="582" width="380" height="64" rx="11" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="550" y="608" text-anchor="middle" class="lbl" fill="#1e3a8a">4 · Render EmailList (no scores yet)</text>
  <text x="550" y="628" text-anchor="middle" class="li">avatar · subject · snippet · date · unread dot</text>
  <line x1="550" y1="646" x2="550" y2="682" class="edge"/>

  <!-- 5 batch triage -->
  <rect x="360" y="684" width="380" height="64" rx="11" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="550" y="710" text-anchor="middle" class="lbl" fill="#166534">5 · POST /api/triage/batch</text>
  <text x="550" y="730" text-anchor="middle" class="li">cache hit → instant · miss → score → badges stream in</text>
</svg>
