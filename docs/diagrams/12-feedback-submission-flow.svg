<svg viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .title{font-size:30px;font-weight:700;fill:#0f172a}
    .sub{font-size:15px;fill:#64748b}
    .lbl{font-size:14px;font-weight:600}
    .li{font-size:12px;fill:#334155}
    .edge{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>

  <text x="550" y="46" text-anchor="middle" class="title">Feedback Submission — DB-first with Fallback</text>
  <text x="550" y="72" text-anchor="middle" class="sub">Identity from session, never the client · graceful degradation if DB is unavailable</text>

  <!-- 1 -->
  <rect x="380" y="100" width="340" height="64" rx="11" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="550" y="126" text-anchor="middle" class="lbl" fill="#1e3a8a">FeedbackModal → submitFeedback()</text>
  <text x="550" y="148" text-anchor="middle" class="li">rating · category · message · role</text>
  <line x1="550" y1="164" x2="550" y2="198" class="edge"/>

  <!-- 2 auth -->
  <rect x="360" y="200" width="380" height="64" rx="11" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="550" y="226" text-anchor="middle" class="lbl" fill="#991b1b">POST /api/feedback — auth required</text>
  <text x="550" y="248" text-anchor="middle" class="li">user identity from current_user.primary_email</text>
  <line x1="550" y1="264" x2="550" y2="298" class="edge"/>
  <text x="760" y="236" class="li" font-style="italic" fill="#475569">client cannot spoof who</text>
  <text x="760" y="252" class="li" font-style="italic" fill="#475569">submitted — no user_email field</text>

  <!-- decision -->
  <polygon points="550,298 720,348 550,398 380,348" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="550" y="346" text-anchor="middle" class="lbl" fill="#854d0e">persistence</text>
  <text x="550" y="364" text-anchor="middle" class="li">enabled?</text>

  <!-- DB path -->
  <line x1="720" y1="348" x2="850" y2="348" class="edge"/>
  <text x="745" y="338" class="li" font-weight="700" fill="#16a34a">yes</text>
  <rect x="850" y="312" width="220" height="72" rx="11" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="960" y="340" text-anchor="middle" class="lbl" fill="#115e59">Feedback table</text>
  <text x="960" y="362" text-anchor="middle" class="li">SQLAlchemy insert</text>
  <text x="960" y="378" text-anchor="middle" class="li">store: "db"</text>

  <!-- file path -->
  <line x1="380" y1="348" x2="250" y2="348" class="edge"/>
  <text x="290" y="338" class="li" font-weight="700" fill="#ef4444">no</text>
  <rect x="30" y="312" width="220" height="72" rx="11" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="140" y="340" text-anchor="middle" class="lbl" fill="#475569">JSON fallback</text>
  <text x="140" y="362" text-anchor="middle" class="li">feedback_store.json</text>
  <text x="140" y="378" text-anchor="middle" class="li">store: "file"</text>

  <!-- merge -->
  <line x1="960" y1="384" x2="600" y2="450" class="edge"/>
  <line x1="140" y1="384" x2="500" y2="450" class="edge"/>

  <rect x="360" y="452" width="380" height="64" rx="11" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="550" y="478" text-anchor="middle" class="lbl" fill="#166534">Response { ok, id, store }</text>
  <text x="550" y="500" text-anchor="middle" class="li">modal shows success screen</text>

  <text x="550" y="560" text-anchor="middle" class="li" font-style="italic">Same DB-first / file-fallback pattern as the queue + cache — the app degrades gracefully, never loses feedback.</text>
</svg>
