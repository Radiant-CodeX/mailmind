name: Deploy Backend to Azure

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v3

      - name: Login to Azure Container Registry
        run: |
          echo "${{ secrets.AZURE_REGISTRY_PASSWORD }}" | docker login -u "${{ secrets.AZURE_REGISTRY_USERNAME }}" --password-stdin "${{ secrets.AZURE_REGISTRY_SERVER }}"

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.AZURE_REGISTRY_SERVER }}/backend:latest ./backend

      - name: Push Docker image
        run: |
          docker push ${{ secrets.AZURE_REGISTRY_SERVER }}/backend:latest

      - name: Login to Azure
        run: |
          echo '${{ secrets.AZURE_CREDENTIALS }}' > /tmp/azure-credentials.json
          az login --service-principal -u $(jq -r '.clientId' /tmp/azure-credentials.json) -p $(jq -r '.clientSecret' /tmp/azure-credentials.json) --tenant $(jq -r '.tenantId' /tmp/azure-credentials.json)
          az account set --subscription $(jq -r '.subscriptionId' /tmp/azure-credentials.json)
          rm /tmp/azure-credentials.json

      - name: Delete old container (if exists)
        run: |
          az container delete --resource-group mailmind-rg --name mailmind-backend --yes || true

      - name: Deploy to Container Instances
        run: |
          az container create \
            --resource-group mailmind-rg \
            --name mailmind-backend \
            --image ${{ secrets.AZURE_REGISTRY_SERVER }}/backend:latest \
            --registry-login-server ${{ secrets.AZURE_REGISTRY_SERVER }} \
            --registry-username ${{ secrets.AZURE_REGISTRY_USERNAME }} \
            --registry-password ${{ secrets.AZURE_REGISTRY_PASSWORD }} \
            --environment-variables \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              QUEUE_BACKEND="memory" \
              APP_ENV="production" \
              APP_RELEASE="mailmind@2.0.0" \
              METRICS_ENABLED="true" \
              AUDIT_LOG_ENABLED="true" \
              DATA_RETENTION_DAYS="90" \
              AZURE_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}" \
              AZURE_CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}" \
              AZURE_CLIENT_SECRET="${{ secrets.AZURE_CLIENT_SECRET }}" \
              AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
              GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              GOOGLE_REDIRECT_URI="${{ secrets.GOOGLE_REDIRECT_URI }}" \
              FRONTEND_ORIGIN="${{ secrets.FRONTEND_ORIGIN }}" \
              APPROVAL_TOKEN="${{ secrets.APPROVAL_TOKEN }}" \
              USE_CHROMA="${{ secrets.USE_CHROMA }}" \
              RATE_LIMIT_PER_MINUTE="${{ secrets.RATE_LIMIT_PER_MINUTE }}" \
            --ports 8000 \
            --protocol TCP \
            --cpu 1 \
            --memory 1.5

      - name: Get container URL
        run: |
          echo "Container is deploying. Check status with:"
          echo "az container show --resource-group mailmind-rg --name mailmind-backend --query ipAddress.fqdn"
