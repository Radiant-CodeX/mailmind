name: Deploy Backend to Azure Container Instances

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Login to Azure Container Registry
        run: |
          echo ${{ secrets.AZURE_REGISTRY_PASSWORD }} | docker login -u ${{ secrets.AZURE_REGISTRY_USERNAME }} --password-stdin ${{ secrets.AZURE_REGISTRY_SERVER }}
      
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.AZURE_REGISTRY_SERVER }}/backend:latest ./backend
          docker push ${{ secrets.AZURE_REGISTRY_SERVER }}/backend:latest
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy to Container Instances
        run: |
          az container create \
            --resource-group mailmind-rg \
            --name mailmind-backend \
            --image ${{ secrets.AZURE_REGISTRY_SERVER }}/backend:latest \
            --registry-login-server ${{ secrets.AZURE_REGISTRY_SERVER }} \
            --registry-username ${{ secrets.AZURE_REGISTRY_USERNAME }} \
            --registry-password ${{ secrets.AZURE_REGISTRY_PASSWORD }} \
            --environment-variables \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              QUEUE_BACKEND="memory" \
              APP_ENV="production" \
              APP_RELEASE="mailmind@2.0.0" \
              METRICS_ENABLED="true" \
              AUDIT_LOG_ENABLED="true" \
              DATA_RETENTION_DAYS="90" \
              AZURE_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}" \
              AZURE_CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}" \
              AZURE_CLIENT_SECRET="${{ secrets.AZURE_CLIENT_SECRET }}" \
              AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
              AZURE_OPENAI_CHAT_DEPLOYMENT="gpt-4o" \
              AZURE_OPENAI_API_VERSION="2024-12-01-preview" \
              AZURE_OPENAI_EMBEDDING_DEPLOYMENT="text-embedding-ada-002" \
              GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              GOOGLE_REDIRECT_URI="${{ secrets.GOOGLE_REDIRECT_URI }}" \
              FRONTEND_ORIGIN="${{ secrets.FRONTEND_ORIGIN }}" \
              APPROVAL_TOKEN="${{ secrets.APPROVAL_TOKEN }}" \
              USE_CHROMA="${{ secrets.USE_CHROMA }}" \
              RATE_LIMIT_PER_MINUTE="${{ secrets.RATE_LIMIT_PER_MINUTE }}" \
              USE_MOCK_GRAPH="${{ secrets.USE_MOCK_GRAPH }}" \
            --ports 8000 \
            --protocol TCP \
            --cpu 1 \
            --memory 1.5