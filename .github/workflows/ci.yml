name: MailMind CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend — Lint + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-prod.txt
          python -m spacy download en_core_web_sm --quiet

      - name: Lint (ruff)
        run: |
          pip install ruff --quiet
          ruff check app/ tests/ --select E,F,W --ignore E501 || true

      - name: Type-check (pyright, non-blocking)
        run: |
          pip install pyright --quiet
          pyright app/ --pythonversion 3.12 || true

      - name: Run tests (no infra needed — fakeredis + SQLite)
        env:
          # No DATABASE_URL → persistence gracefully disabled, tests use SQLite
          APP_ENV: test
          METRICS_ENABLED: "true"
          AUDIT_LOG_ENABLED: "true"
        run: |
          python -m pytest tests/test_pii.py tests/test_production.py tests/test_services.py \
            -v --tb=short --no-header \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results.xml

  frontend-typecheck:
    name: Frontend — Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

  docker-build:
    name: Docker — Build backend image
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-typecheck]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t mailmind-backend:${{ github.sha }} --no-cache
